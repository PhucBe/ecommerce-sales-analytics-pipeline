name: ecommerce-sales-analytics

services:
  postgres:
    image: postgres:16
    container_name: ecommerce_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce_password}
    ports:
      - "${POSTGRES_PORT_LOCAL:-5433}:5432"
    volumes:
      - ecommerce_pg_data:/var/lib/postgresql/data
      - ./sql/ddl/create_schemas.sql:/docker-entrypoint-initdb.d/01_create_schemas.sql
      - ./sql/ddl/create_raw_tables.sql:/docker-entrypoint-initdb.d/02_create_raw_tables.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce_api
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT_LOCAL:-8000}:8000"
    volumes:
      - ./app:/app/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce_network

  metabase:
    image: metabase/metabase:latest
    container_name: ecommerce_metabase
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${METABASE_PORT_LOCAL:-3000}:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - ecommerce_metabase_data:/metabase-data
    networks:
      - ecommerce_network

volumes:
  ecommerce_pg_data:
  ecommerce_metabase_data:

networks:
  ecommerce_network:
    name: ecommerce_network