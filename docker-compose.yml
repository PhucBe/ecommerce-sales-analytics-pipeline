services:
  postgres:
    image: postgres:16
    container_name: ecommerce_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ecommerce_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce_api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.8.2
    container_name: ecommerce_dbt
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /usr/app
    volumes:
      - ./dbt:/usr/app
      - ./dbt/profiles:/root/.dbt
    entrypoint: ["bash", "-lc"]
    command: ["dbt --version"]

  metabase:
    image: metabase/metabase:latest
    container_name: ecommerce_metabase
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: ${MB_DB_FILE}
    volumes:
      - ecommerce_metabase_data:/metabase-data

volumes:
  ecommerce_pg_data:
  ecommerce_metabase_data: