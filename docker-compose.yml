name: ecommerce-sales-analytics

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  image: ecommerce-airflow:3.2.1
  env_file:
    - .env
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
    AIRFLOW__API_AUTH__JWT_SECRET: ecommerce-sales-analytics-airflow-jwt-secret-local-dev-2026-change-before-production
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "airflow:admin"
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: "/opt/airflow/config/simple_auth_manager_passwords.json"
    _AIRFLOW_DB_MIGRATE: "true"
    _AIRFLOW_WWW_USER_CREATE: "true"
    _AIRFLOW_WWW_USER_USERNAME: airflow
    _AIRFLOW_WWW_USER_PASSWORD: airflow

    APP_ENV: settings
    API_BASE_URL: http://api:8000
    API_BASE_URL_DOCKER: http://api:8000
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    POSTGRES_HOST_DOCKER: postgres
    POSTGRES_PORT_DOCKER: 5432
    POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
    POSTGRES_USER: ${POSTGRES_USER:-ecommerceuser}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommercepassword}

  volumes:
    - .:/opt/airflow/project
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/config:/opt/airflow/config
  user: "${AIRFLOW_UID:-50000}:0"
  networks:
    - ecommerce_network
  depends_on:
    airflow-postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    container_name: ecommerce_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-ecommerceuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommercepassword}
    ports:
      - "${POSTGRES_PORT_LOCAL:-5433}:5432"
    volumes:
      - ecommerce_pg_data:/var/lib/postgresql/data
      - ./sql/ddl/create_schemas.sql:/docker-entrypoint-initdb.d/01_create_schemas.sql
      - ./sql/ddl/create_raw_tables.sql:/docker-entrypoint-initdb.d/02_create_raw_tables.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecommerceuser} -d ${POSTGRES_DB:-ecommerce}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce_api
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT_LOCAL:-8000}:8000"
    volumes:
      - ./app:/app/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce_network

  metabase:
    image: metabase/metabase:latest
    container_name: ecommerce_metabase
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${METABASE_PORT_LOCAL:-3000}:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - ecommerce_metabase_data:/metabase-data
    networks:
      - ecommerce_network

  airflow-postgres:
    image: postgres:16
    container_name: ecommerce_airflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - ecommerce_network

  airflow-init:
    <<: *airflow-common
    container_name: ecommerce_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins /opt/airflow/config
        echo '{"airflow": "airflow"}' > /opt/airflow/config/simple_auth_manager_passwords.json
        airflow db migrate
        airflow version

  airflow-api-server:
    <<: *airflow-common
    container_name: ecommerce_airflow_api_server
    command: api-server
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8080}:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: ecommerce_airflow_scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  airflow-dag-processor:
    <<: *airflow-common
    container_name: ecommerce_airflow_dag_processor
    command: dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-triggerer:
    <<: *airflow-common
    container_name: ecommerce_airflow_triggerer
    command: triggerer
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  ecommerce_pg_data:
  ecommerce_metabase_data:
  airflow_pg_data:

networks:
  ecommerce_network:
    name: ecommerce_network
