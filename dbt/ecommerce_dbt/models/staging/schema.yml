version: 2

models:
  - name: stg_customers
    description: Cleaned and deduplicated customer records from raw customer data.
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

      - name: customer_name
        tests:
          - not_null

      - name: email
        tests:
          - not_null

      - name: customer_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - active
                  - inactive
                  - churned

      - name: created_at
        tests:
          - not_null

      - name: updated_at
        tests:
          - not_null

      - name: ingested_at
        tests:
          - not_null


  - name: stg_products
    description: Cleaned and deduplicated product records from raw product data.
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

      - name: product_name
        tests:
          - not_null

      - name: category
        tests:
          - not_null

      - name: brand
        tests:
          - not_null

      - name: unit_price
        tests:
          - not_null

      - name: cost
        tests:
          - not_null

      - name: product_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - active
                  - inactive
                  - discontinued

      - name: created_at
        tests:
          - not_null

      - name: updated_at
        tests:
          - not_null

      - name: ingested_at
        tests:
          - not_null


  - name: stg_orders
    description: Cleaned and deduplicated order header records.
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id

      - name: order_date
        tests:
          - not_null

      - name: order_timestamp
        tests:
          - not_null

      - name: order_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - pending
                  - paid
                  - shipped
                  - completed
                  - cancelled
                  - refunded

      - name: payment_method
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - credit_card
                  - bank_transfer
                  - e_wallet
                  - cod

      - name: subtotal
        tests:
          - not_null

      - name: discount_amount
        tests:
          - not_null

      - name: shipping_fee
        tests:
          - not_null

      - name: total_amount
        tests:
          - not_null

      - name: created_at
        tests:
          - not_null

      - name: updated_at
        tests:
          - not_null

      - name: ingested_at
        tests:
          - not_null


  - name: stg_order_items
    description: Cleaned and deduplicated order line item records.
    columns:
      - name: order_item_id
        tests:
          - not_null
          - unique

      - name: order_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id

      - name: product_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id

      - name: quantity
        tests:
          - not_null

      - name: unit_price
        tests:
          - not_null

      - name: discount_amount
        tests:
          - not_null

      - name: line_amount
        tests:
          - not_null

      - name: calculated_line_amount
        tests:
          - not_null

      - name: line_amount_diff
        tests:
          - not_null

      - name: created_at
        tests:
          - not_null

      - name: updated_at
        tests:
          - not_null

      - name: ingested_at
        tests:
          - not_null